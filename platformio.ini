; openBPMcount — tap-tempo BPM counter & beatmatch assistant
; Target: ideaspark ESP32-WROOM-32 with integrated 0.96" SSD1306 OLED (128x64, I2C)
;   OLED I2C: SDA=GPIO21, SCL=GPIO22, address 0x3C
;   Buttons:  three momentary buttons to GND (internal pull-ups, active LOW)
;             TAP=GPIO27  SWAP=GPIO26  MODE=GPIO25
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
	olikraus/U8g2@^2.36.18
